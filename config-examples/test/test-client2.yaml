# 测试客户端 2 - 连接 client-1 的 RDP 服务
p2p:
  client:
    auth: "my-secret-key-123"
    server-host: "1.2.3.4"
    port: 8084
    client-id: "client-2"

    p2p:
      p2pPort: 5000
      upnpEnabled: false
      tcpHolePunchTimeoutMs: 8000
      holePunchTimeoutMs: 10000
      holePunchIntervalMs: 500
      heartbeatIntervalMs: 15000
      sessionTimeoutMs: 60000
      # 并行连接配置
      parallelConnectEnabled: true
      directConnectRetryIntervalMs: 30000
      autoSwitchToDirect: true
      keepRelayAsBackup: true
      switchDuringActiveConnection: false

    tunnels: []

    connect:
      - peer-id: "client-1"
        remote-port: 3390
        local-bind-port: 13390
        description: "连接 client-1 的 RDP"
